{# 发票明细：不含税金额×税率 → 自动算税额/含税金额；税额、含税金额可手工微调尾差；合计取实际录入值；并阻止回车提交 #}
<script>
(function () {
  function num(el) { return el ? (parseFloat(el.value) || 0) : 0; }
  function q(row, suf) { return row.querySelector('[name$="' + suf + '"]'); }
  var rows = document.querySelectorAll("tr.inv-line");

  // 不含税/税率变化 → 重算税额、含税（覆盖之前的手工值）
  function autofill(r) {
    var u = num(q(r, "-amount_untaxed")), rate = num(q(r, "-tax_rate"));
    var tax = u * rate, taxed = u + tax;
    var et = q(r, "-tax_amount"), ed = q(r, "-amount_taxed");
    if (et) et.value = tax.toFixed(2);
    if (ed) ed.value = taxed.toFixed(2);
  }
  // 手工改税额 → 含税 = 不含税 + 税额
  function fromTax(r) {
    var u = num(q(r, "-amount_untaxed")), tax = num(q(r, "-tax_amount"));
    var ed = q(r, "-amount_taxed");
    if (ed) ed.value = (u + tax).toFixed(2);
  }
  // 手工改含税 → 税额 = 含税 − 不含税
  function fromTaxed(r) {
    var u = num(q(r, "-amount_untaxed")), taxed = num(q(r, "-amount_taxed"));
    var et = q(r, "-tax_amount");
    if (et) et.value = (taxed - u).toFixed(2);
  }
  function recalcTotals() {
    var tu = 0, tx = 0, tt = 0;
    rows.forEach(function (r) {
      tu += num(q(r, "-amount_untaxed"));
      tx += num(q(r, "-tax_amount"));
      tt += num(q(r, "-amount_taxed"));
    });
    var f = document.getElementById("inv-tot");
    if (f) {
      f.querySelector(".t-untaxed").textContent = tu.toFixed(2);
      f.querySelector(".t-tax").textContent = tx.toFixed(2);
      f.querySelector(".t-taxed").textContent = tt.toFixed(2);
    }
  }

  rows.forEach(function (r) {
    var au = q(r, "-amount_untaxed"), ar = q(r, "-tax_rate");
    var et = q(r, "-tax_amount"), ed = q(r, "-amount_taxed");
    if (au) au.addEventListener("input", function () { autofill(r); recalcTotals(); });
    if (ar) ar.addEventListener("input", function () { autofill(r); recalcTotals(); });
    if (et) et.addEventListener("input", function () { fromTax(r); recalcTotals(); });
    if (ed) ed.addEventListener("input", function () { fromTaxed(r); recalcTotals(); });
    // 初次：若税额/含税为空，按不含税×税率自动填一次
    if (et && ed && et.value.trim() === "" && ed.value.trim() === "") autofill(r);
  });
  recalcTotals();

  var form = document.getElementById("invform");
  if (form) form.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && e.target.tagName !== "TEXTAREA"
        && !(e.target.type === "submit" || e.target.tagName === "BUTTON")) {
      e.preventDefault();
    }
  });
})();
</script>
