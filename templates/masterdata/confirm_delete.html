{% extends "base.html" %}
{% block title %}删除{{ title }} · 库存 ERP{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-12 col-lg-6">
    <div class="card border-danger">
      <div class="card-body">
        <h5 class="card-title text-danger">删除{{ title }}</h5>
        <p>确认删除 <strong>{{ object }}</strong>（{{ active_company }}）？此操作不可撤销。</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger">确认删除</button>
          <a href="javascript:history.back()" class="btn btn-outline-secondary">取消</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
